syntax = "proto3";

import "google/protobuf/empty.proto";

package kms;

message AppId {
  bytes app_id = 1;
}

message PublicKeyResponse {
  bytes public_key = 1;
  bytes signature = 2;
}

message AppKeyResponse {
  // TLS CA certificate which is used as the trust anchor for all HTTPS RPCs in the system.
  string ca_cert = 1;
  // Disk encryption key used as the key phrase for the App's full disk encryption.
  bytes disk_crypt_key = 2;
  // X25519 key for decrypting secret environment variables.
  bytes env_crypt_key = 3;
  // ECDSA key for app's Ethereum-compatible signing operations.
  bytes k256_key = 4;
  // Signature of the k256 key signed by the root k256 key.
  bytes k256_signature = 5;
  // Reverse proxy app ID from KmsAuth contract.
  string gateway_app_id = 6;
}

message GetMetaResponse {
  string ca_cert = 1;
  bool allow_any_upgrade = 2;
  bytes k256_pubkey = 3;
  BootstrapResponse bootstrap_info = 4;
}

message KmsKeys {
  string ca_key = 1;
  bytes k256_key = 2;
}

message KmsKeyResponse {
  string temp_ca_key = 1;
  repeated KmsKeys keys = 2;
}

message GetTempCaCertResponse {
  string temp_ca_cert = 1;
  string temp_ca_key = 2;
  string ca_cert = 3;
}

message SignCertRequest {
  bytes csr = 1;
  bytes signature = 2;
}

message SignCertResponse {
  repeated string certificate_chain = 1;
}

message RotateRootKeyRequest {
  // Optional: specify key version to rotate to (if not provided, will increment current version)
  uint32 target_version = 1;
}

message RotateRootKeyResponse {
  uint32 new_version = 1;
  bytes ca_pubkey = 2;
  bytes k256_pubkey = 3;
  bytes quote = 4;
  bytes eventlog = 5;
}

message KeyVersionResponse {
  uint32 current_version = 1;
  uint32 active_version = 2;
  bool rotation_in_progress = 3;
  uint64 rotation_deadline = 4; // Unix timestamp when old keys will be deprecated
}

message GetAppKeyRequest {
  // The app compose file
  string app_compose = 2;
  // Optional: specify key version to use (if not provided, uses active version)
  uint32 key_version = 3;
}

message DeriveK256KeyRequest {
  // Path to the key to derive
  string path = 1;
  // Purpose of the key
  string purpose = 2;
  // Optional: specify key version to use (if not provided, uses active version)
  uint32 key_version = 3;
}

message DeriveK256KeyResponse {
  // Derived k256 key
  bytes k256_key = 1;
  // Signature chain: [derived_key_signature, app_key_signature]
  repeated bytes k256_signature_chain = 2;
}

// The kms public RPC service.
service KMS {
  // Request the app key given the app id and tdx quote
  rpc GetAppKey(GetAppKeyRequest) returns (AppKeyResponse);
  // KMS key handover
  rpc GetKmsKey(google.protobuf.Empty) returns (KmsKeyResponse);
  // Request the app environment encryption public key given the app id
  rpc GetAppEnvEncryptPubKey(AppId) returns (PublicKeyResponse);
  // Request the KMS instance metadata for use as a probe and health check.
  rpc GetMeta(google.protobuf.Empty) returns (GetMetaResponse);
  // Request the temporary CA certificate and key
  rpc GetTempCaCert(google.protobuf.Empty) returns (GetTempCaCertResponse);
  // Sign a certificate
  rpc SignCert(SignCertRequest) returns (SignCertResponse);
  // Rotate root keys to a new version
  rpc RotateRootKey(RotateRootKeyRequest) returns (RotateRootKeyResponse);
  // Get current key version information
  rpc GetKeyVersion(google.protobuf.Empty) returns (KeyVersionResponse);
  // Derive a new ECDSA key with k256 EC curve from app key
  rpc DeriveK256Key(DeriveK256KeyRequest) returns (DeriveK256KeyResponse);
}

message BootstrapRequest {
  string domain = 1;
}

message BootstrapResponse {
  bytes ca_pubkey = 1;
  bytes k256_pubkey = 2;
  bytes quote = 3;
  bytes eventlog = 4;
}

message OnboardRequest {
  string source_url = 1;
  string domain = 2;
}

message OnboardResponse {
}

// The Onboard RPC service.
service Onboard {
  // Bootstrap a new KMS
  rpc Bootstrap(BootstrapRequest) returns (BootstrapResponse);
  // Onboard from existing KMS
  rpc Onboard(OnboardRequest) returns (OnboardResponse);
  // Finish onboarding
  rpc Finish(google.protobuf.Empty) returns (google.protobuf.Empty);
}
